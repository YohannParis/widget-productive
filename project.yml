name: WidgetProductive
options:
  bundleIdPrefix: paris.yohann
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  WidgetProductive:
    type: application
    platform: macOS
    sources:
      - path: WidgetProductive
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: WidgetProductive
        PRODUCT_BUNDLE_IDENTIFIER: paris.yohann.WidgetProductive
        # Menu-bar agent: no Dock icon, no main window
        INFOPLIST_KEY_LSUIElement: YES
        # EventKit (calendar sync) usage strings
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Widget Productive syncs your approved vacation to a calendar you choose."
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: WidgetProductive/WidgetProductive.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: WidgetProductive/WidgetProductive.entitlements
  WidgetProductiveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WidgetProductiveTests
    dependencies:
      - target: WidgetProductive
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: paris.yohann.WidgetProductiveTests
  # Slice 0.5 — throwaway CLI probe, not shipped
  ProductiveProbe:
    type: tool
    platform: macOS
    sources:
      - path: WidgetProductive/Secrets
      - path: WidgetProductive/API
      - path: Probes
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: productive-probe
        PRODUCT_BUNDLE_IDENTIFIER: paris.yohann.ProductiveProbe
        SWIFT_STRICT_CONCURRENCY: complete
schemes:
  ProductiveProbe:
    build:
      targets:
        ProductiveProbe: all
    run:
      executable: ProductiveProbe
  WidgetProductive:
    build:
      targets:
        WidgetProductive: all
        WidgetProductiveTests: [test]
    test:
      targets:
        - WidgetProductiveTests
